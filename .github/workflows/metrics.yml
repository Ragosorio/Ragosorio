# Regenera las stats del perfil (calendario de actividad + lenguajes) con
# datos oficiales de la API de GitHub y la paleta de la marca.
#
# Corre solo todos los dias a las 06:00 GMT-6, y se puede lanzar a mano
# desde la pestana Actions con "Run workflow".
#
# Requiere el secret METRICS_TOKEN (PAT con scope repo).

name: Metrics

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generar SVGs
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: node scripts/generate-stats.mjs

      - name: Commitear si cambiaron
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity.svg assets/languages.svg
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Actualizar stats del perfil [skip ci]"
            git push
          fi
